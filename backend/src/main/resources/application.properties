spring.application.name=gestion-solicitudes
# Base de datos MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/triage_db
spring.datasource.username=root
spring.datasource.password=manu2020
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Puerto
server.port=8080

# IA - Gemini
ai.gemini.enabled=true
ai.gemini.api-key=${GEMINI_API_KEY:fallback}
ai.gemini.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent
ai.gemini.timeout-ms=5000
